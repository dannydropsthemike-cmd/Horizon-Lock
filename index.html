<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Horizon Lock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: rgba(255,255,255,0.07);
      --accent: #00e5ff; --accent2: #ff6b35; --text: #f0f0f5; --muted: rgba(240,240,245,0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
      overflow: hidden; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; opacity: 0.25; }
    .orb1 { width: 300px; height: 300px; background: var(--accent); top: -80px; right: -80px; }
    .orb2 { width: 250px; height: 250px; background: var(--accent2); bottom: -60px; left: -60px; }
    header { width: 100%; padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 10; }
    .logo { font-size: 13px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
    .status-pill {
      display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 100px;
      background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2);
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--accent); transition: all 0.4s;
    }
    .status-pill.unlocked { background: rgba(255,107,53,0.08); border-color: rgba(255,107,53,0.2); color: var(--accent2); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse-dot 2s infinite; transition: background 0.4s; }
    .status-pill.unlocked .status-dot { background: var(--accent2); animation: none; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .viewport { flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .camera-frame {
      width: min(340px, 90vw); aspect-ratio: 9/16; max-height: 55dvh; border-radius: 28px;
      border: 1.5px solid var(--border); background: var(--surface); position: relative;
      overflow: hidden; box-shadow: 0 0 60px rgba(0,229,255,0.06), 0 30px 60px rgba(0,0,0,0.6);
    }
    #cameraVideo, #outputCanvas {
      width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; display: none; border-radius: 28px;
    }
    .camera-placeholder {
      position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; background: linear-gradient(160deg, #0e0e18 0%, #12121f 100%);
    }
    .camera-icon-wrap { width: 64px; height: 64px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; }
    .camera-icon-wrap svg { opacity: 0.3; }
    .camera-placeholder p { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; text-align: center; padding: 0 24px; line-height: 1.6; }
    .horizon-overlay { position: absolute; inset: 0; pointer-events: none; transition: opacity 0.4s; opacity: 0; }
    .horizon-overlay.active { opacity: 1; }
    .horizon-line {
      position: absolute; left: 8%; right: 8%; top: 50%; transform: translateY(-50%); height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent) 20%, var(--accent) 80%, transparent);
    }
    .horizon-line::before, .horizon-line::after {
      content: ''; position: absolute; top: 50%; transform: translateY(-50%);
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    }
    .horizon-line::before { left: 0; } .horizon-line::after { right: 0; }
    .horizon-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 20px; height: 20px; border: 1.5px solid var(--accent); border-radius: 50%; }
    .crosshair-h, .crosshair-v { position: absolute; background: rgba(0,229,255,0.15); display: none; }
    .crosshair-h { left: 10%; right: 10%; top: 50%; height: 1px; }
    .crosshair-v { top: 10%; bottom: 10%; left: 50%; width: 1px; }
    .bracket { position: absolute; width: 20px; height: 20px; border-color: rgba(0,229,255,0.4); border-style: solid; }
    .bracket.tl { top:16px;left:16px;border-width:1.5px 0 0 1.5px; } .bracket.tr { top:16px;right:16px;border-width:1.5px 1.5px 0 0; }
    .bracket.bl { bottom:16px;left:16px;border-width:0 0 1.5px 1.5px; } .bracket.br { bottom:16px;right:16px;border-width:0 1.5px 1.5px 0; }
    .roll-indicator {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent);
      background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 6px; opacity: 0; transition: opacity 0.4s; white-space: nowrap;
    }
    .horizon-overlay.active .roll-indicator { opacity: 1; }
    .rec-badge {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace;
      font-size: 10px; color: #ff3b3b; opacity: 0; transition: opacity 0.4s;
    }
    .rec-badge.active { opacity: 1; }
    .rec-dot { width: 7px; height: 7px; border-radius: 50%; background: #ff3b3b; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .data-readout { width: min(340px, 90vw); margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .data-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 10px; text-align: center; }
    .data-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
    .data-value { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 300; color: var(--text); transition: color 0.3s; line-height: 1; }
    .data-value.active { color: var(--accent); } .data-value.warn { color: var(--accent2); }
    .data-unit { font-size: 10px; color: var(--muted); margin-left: 2px; }
    .controls { width: 100%; padding: 16px 24px 32px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .toggle-row { display: flex; gap: 10px; width: min(340px, 90vw); }
    .btn {
      flex: 1; padding: 14px 10px; border-radius: 16px; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--muted); font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn:active { transform: scale(0.96); }
    .btn.primary { background: rgba(0,229,255,0.1); border-color: rgba(0,229,255,0.35); color: var(--accent); }
    .btn.primary.on { background: var(--accent); border-color: var(--accent); color: #000; box-shadow: 0 0 24px rgba(0,229,255,0.35); }
    .btn.secondary { font-size: 12px; }
    .btn.secondary.on { background: rgba(255,107,53,0.1); border-color: rgba(255,107,53,0.3); color: var(--accent2); }
    .main-btn {
      width: min(340px, 90vw); padding: 18px; border-radius: 20px; border: none;
      background: linear-gradient(135deg, #00e5ff, #0099cc); color: #000;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 0.08em;
      cursor: pointer; transition: all 0.25s; box-shadow: 0 8px 30px rgba(0,229,255,0.25);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .main-btn:active { transform: scale(0.97); }
    .main-btn.recording { background: linear-gradient(135deg, #ff3b3b, #cc0000); box-shadow: 0 8px 30px rgba(255,59,59,0.3); }
    .toast {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: rgba(30,30,40,0.95); border: 1px solid var(--border); border-radius: 100px;
      padding: 10px 20px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text);
      opacity: 0; pointer-events: none; transition: all 0.3s; white-space: nowrap; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <header>
    <div class="logo">Horizon Lock</div>
    <div class="status-pill unlocked" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">UNLOCKED</span>
    </div>
  </header>

  <div class="viewport">
    <div class="camera-frame">
      <div class="camera-placeholder" id="placeholder">
        <div class="camera-icon-wrap">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <p>Tap START CAMERA<br>to enable Horizon Lock</p>
      </div>

      <video id="cameraVideo" autoplay muted playsinline></video>
      <canvas id="outputCanvas"></canvas>

      <div class="horizon-overlay" id="horizonOverlay">
        <div class="crosshair-h"></div><div class="crosshair-v"></div>
        <div class="bracket tl"></div><div class="bracket tr"></div>
        <div class="bracket bl"></div><div class="bracket br"></div>
        <div class="horizon-line" id="horizonLine"></div>
        <div class="horizon-center"></div>
        <div class="roll-indicator" id="rollIndicator">ROLL 0.0°</div>
      </div>

      <div class="rec-badge" id="recBadge"><div class="rec-dot"></div>REC</div>
    </div>

    <div class="data-readout">
      <div class="data-card"><div class="data-label">Roll</div><div class="data-value" id="rollVal">—<span class="data-unit">°</span></div></div>
      <div class="data-card"><div class="data-label">Pitch</div><div class="data-value" id="pitchVal">—<span class="data-unit">°</span></div></div>
      <div class="data-card"><div class="data-label">Zoom</div><div class="data-value" id="zoomVal">—<span class="data-unit">x</span></div></div>
    </div>
  </div>

  <div class="controls">
    <div class="toggle-row">
      <button class="btn primary" id="lockBtn" onclick="toggleHorizonLock()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        HORIZON LOCK
      </button>
      <button class="btn secondary" id="gridBtn" onclick="toggleGrid()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/><line x1="12" y1="3" x2="12" y2="21"/>
        </svg>
        GRID
      </button>
    </div>
    <button class="main-btn" id="mainBtn" onclick="handleMainBtn()">
      <svg id="mainBtnIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      <span id="mainBtnText">START CAMERA</span>
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────────
    let cameraActive = false, horizonLocked = false, gridVisible = false, isRecording = false;
    let stream = null, animFrame = null, mediaRecorder = null, recordedChunks = [];
    let rawRoll = 0, rawPitch = 0, smoothRoll = 0;

    // Higher = more responsive to tilt, lower = smoother/slower. 0.20 is a good
    // balance for hand-held use — similar feel to S26 horizon lock.
    const SMOOTH = 0.20;

    // ── Fixed output canvas dimensions (portrait 1080p) ───────────────────────────
    const OUT_W = 1080, OUT_H = 1920;

    // ── Stabilization scale ───────────────────────────────────────────────────────
    //
    // After rotation, the (possibly rotated) source image must fully cover the
    // output rectangle. Worst-case coverage radius = circumscribed radius of output.
    // Available coverage radius = inscribed radius of source = min(srcW,srcH)/2.
    //
    // STAB_SCALE = √(OUT_W²+OUT_H²) / min(srcW,srcH)  (+ 0.5% safety margin)
    //
    // e.g. 1920×1080 source → STAB_SCALE ≈ 2.04  (2× zoom, corrects up to ±90°)
    //
    let STAB_SCALE = 1.02;   // placeholder; recomputed when real stream dims arrive

    // Set in startCamera() once we know the source dimensions.
    // Landscape source (vW > vH): needs +90° to display upright in portrait canvas.
    // Portrait source  (vW ≤ vH): already portrait, no base rotation needed.
    let portraitRad = Math.PI / 2;

    // requestVideoFrameCallback is available on iOS 15.4+ / Safari 15.4+.
    // It fires ONLY when a new video frame is decoded (≈ camera fps, e.g. 30 Hz),
    // not at the display refresh rate (60–120 Hz).  Using it cuts wasted draws by
    // 50–75% vs requestAnimationFrame, which is the primary cause of low framerate.
    const supportsRVFC = typeof HTMLVideoElement !== 'undefined' &&
      'requestVideoFrameCallback' in HTMLVideoElement.prototype;

    function computeScale(srcW, srcH) {
      const outCircum = Math.sqrt(OUT_W * OUT_W + OUT_H * OUT_H);
      return (outCircum / Math.min(srcW, srcH)) * 1.005;  // 0.5 % safety margin
    }

    // ─── DOM ─────────────────────────────────────────────────────────────────────
    const video    = document.getElementById('cameraVideo');
    const canvas   = document.getElementById('outputCanvas');
    // alpha:false lets the compositor skip blending — minor but free perf gain
    const ctx      = canvas.getContext('2d', { alpha: false });
    const ph       = document.getElementById('placeholder');
    const hOverlay = document.getElementById('horizonOverlay');
    const hLine    = document.getElementById('horizonLine');
    const rollInd  = document.getElementById('rollIndicator');
    const recBadge = document.getElementById('recBadge');
    const sPill    = document.getElementById('statusPill');
    const sText    = document.getElementById('statusText');
    const rollEl   = document.getElementById('rollVal');
    const pitchEl  = document.getElementById('pitchVal');
    const zoomEl   = document.getElementById('zoomVal');
    const lockBtn  = document.getElementById('lockBtn');
    const gridBtn  = document.getElementById('gridBtn');
    const mainBtn  = document.getElementById('mainBtn');
    const btnText  = document.getElementById('mainBtnText');
    const btnIcon  = document.getElementById('mainBtnIcon');
    const toastEl  = document.getElementById('toast');

    // Fix canvas size once — resizing clears the canvas and breaks recording.
    canvas.width = OUT_W;
    canvas.height = OUT_H;

    // ─── Toast ───────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    // ─── Orientation ─────────────────────────────────────────────────────────────
    //
    // BUG FIX — the previous gravity-vector decomposition:
    //
    //   gx = cos(α)·sin(γ) + sin(α)·sin(β)·cos(γ)
    //   gy = sin(α)·sin(γ) − cos(α)·sin(β)·cos(γ)
    //   roll = atan2(gx, gy)
    //
    // When the phone is held portrait-upright (β≈90°, γ≈0°) this simplifies to:
    //   gx ≈ sin(α),  gy ≈ −cos(α)
    //   roll ≈ atan2(sin(α), −cos(α))   → the COMPASS BEARING, not device tilt!
    //
    // So whatever direction you face (e.g. ~160° SE) becomes the "roll", which is
    // why the canvas immediately snaps to ±160° on activation.
    //
    // FIX: use e.gamma directly.
    //   gamma = rotation around the device's Y-axis (the long/portrait axis).
    //   In portrait orientation this is exactly left/right tilt — the roll we want.
    //   Range: −90° (tilted left) … +90° (tilted right).
    //   No decomposition needed; the browser already provides this value.
    //
    function handleOrientation(e) {
      rawRoll  = e.gamma ?? 0;   // device roll: −90 left … +90 right
      rawPitch = e.beta  ?? 0;   // device pitch: forward/back tilt

      // Exponential moving average — fast to converge, no wrap needed (γ ∈ [−90,90])
      smoothRoll += (rawRoll - smoothRoll) * SMOOTH;

      // UI readouts
      rollEl.textContent  = rawRoll.toFixed(1) + '°';
      pitchEl.textContent = rawPitch.toFixed(1) + '°';
      const abs = Math.abs(rawRoll);
      rollEl.className = 'data-value' + (abs < 3 ? ' active' : abs > 20 ? ' warn' : '');

      if (horizonLocked) {
        const shift = Math.max(-40, Math.min(40, rawRoll / 90 * 40));
        hLine.style.top  = `${50 + shift}%`;
        rollInd.textContent = `ROLL ${rawRoll.toFixed(1)}°`;
      }
    }

    function startOrientationListener() {
      window.addEventListener('deviceorientation', handleOrientation, { passive: true });
    }

    async function requestOrientationPermission() {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const p = await DeviceOrientationEvent.requestPermission();
          if (p === 'granted') startOrientationListener();
          else showToast('Motion denied — tilt stabilization off');
        } catch(e) { startOrientationListener(); }
      } else {
        startOrientationListener();
      }
    }

    // ─── Camera ──────────────────────────────────────────────────────────────────
    async function startCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        showToast('Camera not supported — use Safari'); return;
      }

      // iPhone 17 base: request 1080p first for best framerate.
      // The canvas is 1080×1920 so 1080p source → STAB_SCALE ≈ 2.04×; that's fine.
      // 4K → 2.1 M-pixel canvas makes the GPU work 4× harder for no display benefit.
      const tries = [
        { video: { facingMode: { exact: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false },
        { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false },
        { video: { facingMode: 'environment' }, audio: false },
        { video: true, audio: false }
      ];

      let got = null, err = null;
      for (const c of tries) {
        try { got = await navigator.mediaDevices.getUserMedia(c); break; }
        catch(e) { err = e; }
      }

      if (!got) {
        const n = err?.name || '';
        if (n === 'NotAllowedError' || n === 'PermissionDeniedError')
          showToast('Denied → Settings → Safari → Camera → Allow');
        else if (n === 'NotFoundError') showToast('No camera found');
        else if (n === 'NotReadableError') showToast('Camera busy — close other apps');
        else if (location.protocol !== 'https:' && location.hostname !== 'localhost')
          showToast('Needs HTTPS — use GitHub Pages');
        else showToast('Camera error: ' + (err?.message || 'unknown'));
        return;
      }

      stream = got;
      video.srcObject = stream;
      video.style.display = 'block';
      ph.style.display = 'none';
      try { await video.play(); } catch(e) {}

      // Wait for real dimensions to arrive (crucial — metadata fires asynchronously)
      await new Promise(res => {
        if (video.videoWidth) { res(); return; }
        video.addEventListener('loadedmetadata', res, { once: true });
      });

      const vW = video.videoWidth  || 1920;
      const vH = video.videoHeight || 1080;

      // Auto-detect source orientation.
      // iOS typically delivers a landscape buffer (vW > vH) even in portrait mode;
      // we rotate +90° to make it upright. If the browser has already rotated the
      // buffer (vW ≤ vH) no correction is needed.
      portraitRad = vW > vH ? Math.PI / 2 : 0;

      STAB_SCALE = computeScale(vW, vH);
      zoomEl.textContent = STAB_SCALE.toFixed(3) + 'x';
      zoomEl.className = 'data-value active';

      cameraActive = true;
      btnText.textContent = 'START RECORDING';
      btnIcon.innerHTML = `<circle cx="12" cy="12" r="8" fill="currentColor"/>`;
      const orient = portraitRad ? 'land→port' : 'portrait';
      showToast(`${vW}×${vH} ${orient} · ${STAB_SCALE.toFixed(2)}× · ${supportsRVFC ? 'rVFC ✓' : 'RAF'}`);

      await requestOrientationPermission();
      scheduleFrame();
    }

    function stopCamera() {
      stream?.getTracks().forEach(t => t.stop()); stream = null;
      cancelFrame();
      video.style.display = 'none';
      canvas.style.display = 'none';
      ph.style.display = 'flex';
      cameraActive = false;
      if (horizonLocked) { horizonLocked = false; updateLockUI(); }
      if (isRecording) stopRecording();
      btnText.textContent = 'START CAMERA';
      btnIcon.innerHTML = `<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>`;
      mainBtn.classList.remove('recording');
      zoomEl.textContent = '—'; zoomEl.className = 'data-value';
    }

    // ─── Render loop ─────────────────────────────────────────────────────────────
    //
    // Pipeline (when horizon lock is active):
    //
    //   1. translate to canvas centre
    //   2. rotate by (portraitRad − smoothRoll·π/180)
    //        portraitRad   = +π/2 if source is landscape, else 0
    //        −smoothRoll   = counter-rotation that cancels device tilt
    //        net result    = horizon stays level regardless of phone roll
    //   3. scale by STAB_SCALE — fills canvas at all roll angles, no black bars
    //   4. drawImage centered on origin
    //
    // imageSmoothingEnabled = false: skips bilinear filtering, a significant GPU
    // saving on mobile (video already has its own temporal filtering).
    //
    function drawFrame() {
      if (!horizonLocked || video.readyState < 2) return;
      const vW = video.videoWidth, vH = video.videoHeight;
      if (!vW || !vH) return;

      ctx.save();
      ctx.clearRect(0, 0, OUT_W, OUT_H);
      ctx.imageSmoothingEnabled = false;   // nearest-neighbour; much faster on mobile
      ctx.translate(OUT_W / 2, OUT_H / 2);
      ctx.rotate(portraitRad - smoothRoll * Math.PI / 180);
      ctx.scale(STAB_SCALE, STAB_SCALE);
      ctx.drawImage(video, -vW / 2, -vH / 2, vW, vH);
      ctx.restore();
    }

    // scheduleFrame / cancelFrame — use requestVideoFrameCallback when available.
    // rVFC fires once per decoded video frame (e.g. 30 Hz) rather than once per
    // display refresh (60–120 Hz), so we never waste GPU time redrawing an
    // unchanged frame.  Falls back to rAF on older Safari.
    function scheduleFrame() {
      if (!cameraActive) return;
      if (supportsRVFC) {
        animFrame = video.requestVideoFrameCallback(onFrame);
      } else {
        animFrame = requestAnimationFrame(onFrame);
      }
    }

    function cancelFrame() {
      if (animFrame === null) return;
      if (supportsRVFC) {
        video.cancelVideoFrameCallback(animFrame);
      } else {
        cancelAnimationFrame(animFrame);
      }
      animFrame = null;
    }

    function onFrame() {
      drawFrame();
      scheduleFrame();
    }

    // ─── Lock toggle ─────────────────────────────────────────────────────────────
    function toggleHorizonLock() {
      if (!cameraActive) { showToast('Start camera first'); return; }
      horizonLocked = !horizonLocked;
      updateLockUI();
      if (horizonLocked) {
        video.style.display = 'none';
        canvas.style.display = 'block';
        showToast('Horizon locked');
      } else {
        canvas.style.display = 'none';
        video.style.display = 'block';
        hLine.style.top = '50%';
        showToast('Horizon unlocked');
      }
    }

    function updateLockUI() {
      lockBtn.classList.toggle('on', horizonLocked);
      hOverlay.classList.toggle('active', horizonLocked);
      sPill.classList.toggle('unlocked', !horizonLocked);
      sText.textContent = horizonLocked ? 'LOCKED' : 'UNLOCKED';
    }

    // ─── Grid toggle ─────────────────────────────────────────────────────────────
    function toggleGrid() {
      gridVisible = !gridVisible;
      gridBtn.classList.toggle('on', gridVisible);
      document.querySelectorAll('.crosshair-h,.crosshair-v').forEach(el => {
        el.style.display = gridVisible ? 'block' : 'none';
      });
    }

    // ─── Recording ───────────────────────────────────────────────────────────────
    function getBestMimeType() {
      return ['video/mp4;codecs=avc1','video/mp4','video/webm;codecs=vp9','video/webm']
        .find(t => MediaRecorder.isTypeSupported(t)) || '';
    }

    function startRecording() {
      if (!stream) return;
      recordedChunks = [];
      const recStream = horizonLocked ? canvas.captureStream(30) : stream;
      const mime = getBestMimeType();
      try {
        mediaRecorder = mime ? new MediaRecorder(recStream, { mimeType: mime }) : new MediaRecorder(recStream);
      } catch(e) { showToast('Recording not supported'); return; }
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = saveRecording;
      mediaRecorder.start(100);
      isRecording = true;
      recBadge.classList.add('active');
      mainBtn.classList.add('recording');
      btnText.textContent = 'STOP RECORDING';
      btnIcon.innerHTML = `<rect x="4" y="4" width="16" height="16" rx="2" fill="currentColor"/>`;
      showToast('Recording…');
    }

    function stopRecording() {
      mediaRecorder?.state !== 'inactive' && mediaRecorder.stop();
      isRecording = false;
      recBadge.classList.remove('active');
      mainBtn.classList.remove('recording');
      btnText.textContent = 'START RECORDING';
      btnIcon.innerHTML = `<circle cx="12" cy="12" r="8" fill="currentColor"/>`;
    }

    function saveRecording() {
      const isMP4 = (mediaRecorder.mimeType || '').includes('mp4');
      const ext = isMP4 ? 'mp4' : 'webm';
      const blob = new Blob(recordedChunks, { type: isMP4 ? 'video/mp4' : 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `horizon-lock-${Date.now()}.${ext}`; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast(`Saved as .${ext}`);
    }

    // ─── Main button ─────────────────────────────────────────────────────────────
    function handleMainBtn() {
      if (!cameraActive) { startCamera(); return; }
      if (!isRecording)  { startRecording(); return; }
      stopRecording();
    }
  </script>
</body>
</html>
